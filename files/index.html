<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Directory</title>
</head>
<body>
    <div class="directory-container">
        <div class="directory-header">📁 files/</div>
        <ul class="directory-tree">
            <li class="directory-item">
                <a href="/files/mire/" class="tree-line">
                    <span class="tree-icon">📁</span>
                    <span class="tree-name">mire.frx/</span>
                </a>
            </li>
            <li class="directory-item">
                <a href="/files/droog/" class="tree-line">
                    <span class="tree-icon">📁</span>
                    <span class="tree-name">droog.frx/</span>
                </a>
            </li>
        </ul>
    </div>
    <!-- Subnets (collapsible) -->
    <li class="directory-item expandable">
        <a href="/files/caine/" class="tree-line">
            <span class="tree-arrow">▶</span>
            <span class="tree-icon">📁</span>
            <span class="tree-name">caine.subnet</span>
        </a>
        <ul class="nested-tree">...</ul>
    </li>

<!-- Sidenets (always expanded, no header link) -->
    <div class="sidenet-container">
        <h3>SIDENETS</h3>
        <ul class="directory-tree">
            <li class="directory-item expandable">
                <span class="tree-line" style="cursor: default;">
                    <span class="tree-icon">🔗</span>
                    <span class="tree-name">Network Name</span>
                </span>
                <ul class="nested-tree expanded">...</ul>
            </li>
        </ul>
    </div>
</body>
</html>
