<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Directory</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <div class="main-layout">
        <!-- LEFT COLUMN -->
        <div class="left-column">
            <!-- Main files directory -->
            <div class="directory-container">
                <div class="directory-header">📁 files/</div>
                <ul class="directory-tree">
                    <li class="directory-item">
                        <a href="/aedistrict-sys/files/mire/" class="tree-line">
                            <span class="tree-icon">📁</span>
                            <span class="tree-name">mire.frx/</span>
                        </a>
                    </li>
                    <li class="directory-item">
                        <a href="/aedistrict-sys/files/droog/" class="tree-line">
                            <span class="tree-icon">📁</span>
                            <span class="tree-name">droog.frx/</span>
                        </a>
                    </li>
                </ul>
            </div>

            <!-- Subnets (collapsible) -->
            <div class="directory-container">
                <div class="directory-header">📋 Subnets</div>
                <ul class="directory-tree">
                    <li class="directory-item expandable">
                        <div style="display: flex; align-items: center; width: 100%;">
                            <button class="tree-arrow-btn" title="Toggle expand">
                                <span class="tree-arrow">▶</span>
                            </button>
                            <a href="/aedistrict-sys/files/caine/" class="tree-line" style="flex: 1; padding-left: 0; margin-left: 4px;">
                                <span class="tree-icon">📁</span>
                                <span class="tree-name">caine.subnet</span>
                            </a>
                        </div>
                        <ul class="nested-tree">
                            <li class="nested-item">
                                <a href="/aedistrict-sys/files/caine/abel" class="nested-line">
                                    <span class="nested-icon">📄</span>
                                    <span>abel</span>
                                </a>
                            </li>
                            <li class="nested-item">
                                <a href="/aedistrict-sys/files/caine/AR" class="nested-line">
                                    <span class="nested-icon">📄</span>
                                    <span>AR</span>
                                </a>
                            </li>
                            <li class="nested-item">
                                <a href="/aedistrict-sys/files/caine/rubicon" class="nested-line">
                                    <span class="nested-icon">📄</span>
                                    <span>rubicon</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-column">
            <!-- Sidenets (always expanded, non-closable) -->
            <div class="sidenet-container">
                <h3>🔗 SIDENETS</h3>
                <ul class="directory-tree">
                    <li class="directory-item expandable">
                        <span class="tree-line" style="cursor: default;">
                            <span class="tree-icon">🌐</span>
                            <span class="tree-name">Network 1</span>
                        </span>
                        <ul class="nested-tree expanded">
                            <li class="nested-item">
                                <a href="/aedistrict-sys/sidenet/network1/item1" class="nested-line">
                                    <span class="nested-icon">📌</span>
                                    <span>Item 1</span>
                                </a>
                            </li>
                            <li class="nested-item">
                                <a href="/aedistrict-sys/sidenet/network1/item2" class="nested-line">
                                    <span class="nested-icon">📌</span>
                                    <span>Item 2</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                    <li class="directory-item expandable">
                        <span class="tree-line" style="cursor: default;">
                            <span class="tree-icon">🌐</span>
                            <span class="tree-name">Network 2</span>
                        </span>
                        <ul class="nested-tree expanded">
                            <li class="nested-item">
                                <a href="/aedistrict-sys/sidenet/network2/item1" class="nested-line">
                                    <span class="nested-icon">📌</span>
                                    <span>Item 1</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
